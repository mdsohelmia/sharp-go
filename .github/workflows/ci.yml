name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CGO_ENABLED: '1'

jobs:
  test-linux:
    name: Linux / Go ${{ matrix.go }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        go: ['1.24']

    steps:
      - uses: actions/checkout@v5

      - name: Install libvips
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libvips-dev pkg-config build-essential

      - name: Check libvips version
        run: pkg-config --modversion vips

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache-dependency-path: go.mod

      - name: Doctor
        run: make doctor

      - name: Vet
        run: make vet

      - name: Build
        run: make build

      - name: Test (race)
        run: make test-race

      - name: Benchmarks (smoke)
        run: go test -count=1 -bench=. -benchtime=1s -run='^$' .

  test-macos:
    name: macOS arm64 / Go ${{ matrix.go }}
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        go: ['1.24']

    steps:
      - uses: actions/checkout@v5

      - name: Install libvips
        run: brew install vips pkg-config

      - name: Check libvips version
        run: pkg-config --modversion vips

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache-dependency-path: go.mod

      - name: Doctor
        run: make doctor

      - name: Vet
        run: make vet

      - name: Test (race)
        run: make test-race

  fuzz-smoke:
    name: Fuzz smoke
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - run: sudo apt-get update && sudo apt-get install -y libvips-dev pkg-config
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: go.mod
      - name: Fuzz Metadata (30s)
        run: go test -run='^$' -fuzz=FuzzMetadataDecode -fuzztime=30s .
      - name: Fuzz JPEGEncode (30s)
        run: go test -run='^$' -fuzz=FuzzJPEGEncode -fuzztime=30s .
